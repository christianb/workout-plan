=== USER PROFILE ===

=== STRUCTURE ===
Rolling 8-day cycle (not fixed to calendar days):
D1:Push D2:Rest D3:Pull D4:Rest D5:Legs+Light D6:Rest D7:Arms D8:Rest
Chosen over fixed weekly schedule for even recovery distribution.
Session order Push-Pull-Legs+Light-Arms was mathematically optimized across all 6 possible orderings.
This gives perfect 4+4 day gaps for Chest, Shoulders, Biceps, Forearms (user priority muscles).
Triceps: 6+2 gap (Arms heavy → Push secondary, acceptable). Back: 2+6 gap (Pull heavy → Legs+Light light, acceptable).
Triceps restructuring (Jul 2026): Push day reduced to single pushdown 3x12 (secondary only — pre-fatigued by pressing). Arms day: skull crushers 3x10 → close grip bench 4x8 → dips 3x12 → pushdown rope 2x15. Cable overhead extension removed from both days.

=== FREQUENCY PER 8-DAY CYCLE ===
Chest: 2x (D1 heavy, D5 light)
Shoulders: 2x (D1 heavy, D5 light)
Triceps: 4x per cycle (D1 secondary, D3 light pump, D5 light pump, D7 heavy — PRIMARY GOAL)
Biceps: 4x per cycle (D1 light pump, D3 secondary, D5 light pump, D7 heavy — PRIMARY GOAL)
Back: 2x (D3 heavy, D7 light)
Abs: 4x per cycle (D1, D3, D5, D7 — PRIMARY GOAL)
Forearms: 1x (D7 heavy only)
USER PRIORITY: Arms (biceps + triceps) and abs are primary goal. Everything else is secondary but maintained.
HIGH-FREQUENCY ARM RULE: D1/D3/D5 arm work is pump/maintenance ONLY — 2 sets, 15-20 reps, 30-40% less weight than D7, NEVER near failure. D7 Arms is the only true growth session — protect it at all costs.

=== KEY EXERCISE DECISIONS ===
- External rotation: ACTIVATION before pressing on Push day (2x15 light). Strength work on Pull day (3x12 heavier). Internal rotation removed — already overtrained by compound movements.
- Shoulder press additions (Jul 2026): Machine shoulder press replaced on Push day with Militärpresse stehend (standing barbell military press) 4x8 — heavier compound movement with full stabilizer demand. Machine shoulder press replaced on Legs+Light day with Arnold Press sitzend (seated Arnold press) 2x15 — rotational press training all three delt heads through full arc. Two genuinely different shoulder press stimuli across the cycle without adding session length.

Push (D1): Machine crunch 3x15 (flexion) + Pallof press 2x15 (rotation)
Pull (D3): Machine crunch 2x15 (flexion) + Side elbow plank with rotation 2x15 (rotation)
Arms (D7): Machine crunch 3x15 (flexion) + Side elbow plank with rotation 2x15 (rotation) + Pallof press 2x15 (rotation)

body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;-webkit-font-smoothing:antialiased}

/* ── Header ── */
.header{position:sticky;top:0;z-index:100;background:var(--surface);border-bottom:1px solid var(--border);padding-top:calc(var(--safe-top) + 10px);padding-left:14px;padding-right:14px}

</style>

        {name:"Latissimus dorsi back stretch",sets:1,reps:"45s"},
        {name:"Child's pose stretch",sets:1,reps:"45s"},
        {name:"Seated torso twist stretch",sets:1,reps:"45s",note:"hold each side"},
        {name:"Trapezoid muscle stretch",sets:1,reps:"45s",note:"hold each side"},
      ]},
    ],
    cardio:"Treadmill · 20 min · 125–130bpm"},

  3:{title:"Arms",duration:"~3h 00min",focus:["Biceps","Triceps","Back","Forearms","Abs"],warmup:"Stepper · 5 min",
    sections:[
      {name:"Biceps",color:"#534AB7",ex:[
        {name:"SZ-Curls sitzend (seated EZ bar curl)",sets:3,reps:"8",note:"heavy bilateral loading — do this first while biceps are freshest"},
        {name:"Incline dumbbell curl",sets:3,reps:"12"},
        {name:"One-arm dumbbell preacher curl",sets:3,reps:"12"},
      ]},
      {name:"Triceps",color:"#185FA5",ex:[
        {name:"Trizeps Extension mit SZ-Stange liegend (EZ bar skull crushers)",sets:3,reps:"10",note:"triceps fully fresh — heavy stretch on long head"},
        {name:"Bankdrücken Langhantel enger Griff (close grip bench press)",sets:4,reps:"8",note:"heavy compound — all three heads"},
        {name:"Parallel bar triceps dips",sets:3,reps:"12"},
        {name:"Triceps pushdown — rope attachment",sets:2,reps:"15",note:"isolation finisher"},
      ]},
      {name:"Back (light)",color:"#185FA5",ex:[
        {name:"Narrow grip seated row",sets:2,reps:"15",note:"30–40% less than Pull day"},
        {name:"Lever seated reverse fly (reverse grip)",sets:2,reps:"15",note:"30–40% less than Pull day"},
        {name:"Überzüge am Seilzug stehend (standing cable lat pullover)",sets:2,reps:"15",note:"pure lat isolation — no bicep involvement, stretch focused"},
      ]},
      {name:"Forearms",color:"#854F0B",ex:[
        {name:"Single-arm dumbbell reverse wrist curl (overhand)",sets:2,reps:"15",note:"extension"},
        {name:"Single-arm dumbbell wrist curl (underhand)",sets:2,reps:"15",note:"flexion"},
        {name:"Dead hang from pull-up bar",sets:3,reps:"30–45s",note:"grip endurance — rest 60s between sets"},
      ]},
      {name:"Abs",color:"#993C1D",ex:[
        {name:"Abdominal crunch (machine assisted)",sets:3,reps:"15",note:"flexion"},
        {name:"Side elbow plank with rotation",sets:2,reps:"15",note:"rotation"},
        {name:"Pallof press outward rotations",sets:2,reps:"15",note:"rotation"},
      ]},
      {name:"Stretching",color:"#7B8FA5",ex:[
        {name:"Overhead triceps stretch",sets:1,reps:"45s",note:"hold each side"},
        {name:"Hand and shoulder extensor stretch",sets:1,reps:"45s",note:"hold each side"},
        {name:"Wrist flexors stretch",sets:1,reps:"45s",note:"hold each side"},
        {name:"Wrist extensor stretch",sets:1,reps:"45s",note:"hold each side"},
      ]},
    ],
    cardio:"Treadmill · 20 min · 125–130bpm"},

  4:{title:"Legs",duration:"~2h 35min",focus:["Legs","Shoulders","Chest","Biceps","Triceps","Abs"],warmup:"Stepper · 5 min",
    dayNote:"Do legs first while fresh. Shoulder and chest work is lighter — 30–40% less than Push day.",
    sections:[
      {name:"Quads & glutes",color:"#185FA5",ex:[
        {name:"Seated leg press",sets:4,reps:"10",note:"main compound"},
        {name:"Bulgarian split squat",sets:3,reps:"10 each leg",note:"rear foot elevated on bench — slow on the way down"},
        {name:"Seated leg extensions",sets:3,reps:"12"},
      ]},
      {name:"Hamstrings",color:"#0F6E56",ex:[
        {name:"Prone leg curl machine",sets:3,reps:"12"},
      ]},
      {name:"Calves & adductors",color:"#534AB7",ex:[
        {name:"Calf raises",sets:2,reps:"20"},
        {name:"Inner adductor workout",sets:2,reps:"15"},
        {name:"Leg abduction with machine",sets:2,reps:"15"},
      ]},
      {name:"Shoulders (light)",color:"#3B6D11",ex:[
        {name:"Standing shoulder external rotation",sets:2,reps:"15"},
        {name:"Arnold Press sitzend (seated Arnold press)",sets:2,reps:"15",note:"rotational press — trains all three delt heads through full arc"},
        {name:"One-arm cable lateral raise",sets:2,reps:"15"},
        {name:"Standing rope face pull",sets:2,reps:"15"},
      ]},
      {name:"Chest (light)",color:"#185FA5",ex:[
        {name:"Kabelzug über Kreuz stehend (standing cable crossover)",sets:2,reps:"15",note:"constant tension throughout — different stimulus from all Push day chest work"},
      ]},
      {name:"Biceps (light)",color:"#534AB7",ex:[
        {name:"Hammer Curls sitzend (seated hammer curl)",sets:2,reps:"15",note:"pump only — different from Arms day exercises, never near failure"},
      ]},
      {name:"Triceps (light)",color:"#185FA5",ex:[
        {name:"Trizepsdrücken stehend mit Kurzhanteln (standing dumbbell triceps extension)",sets:2,reps:"15",note:"pump only — different from Arms day exercises, never near failure"},
      ]},
      {name:"Abs",color:"#993C1D",ex:[
        {name:"Abdominal crunch (machine assisted)",sets:2,reps:"15",note:"flexion"},
        {name:"Side elbow plank with rotation",sets:2,reps:"15",note:"rotation"},
      ]},
      {name:"Stretching",color:"#7B8FA5",ex:[
        {name:"Low lunge with one arm raised",sets:1,reps:"45s",note:"hold each side"},
        {name:"Quadriceps stretch",sets:1,reps:"45s",note:"hold each side"},
        {name:"Seated single-leg hamstring stretch",sets:1,reps:"45s",note:"hold each side"},
        {name:"Pigeon stretch",sets:1,reps:"45s",note:"hold each side"},
        {name:"Calves stretch against the wall",sets:1,reps:"45s",note:"hold each side"},
      ]},
    ],
    cardio:"Treadmill · 20 min · 110–120bpm (legs fatigued — keep to walking pace)"},
};

// ── State ──────────────────────────────────────────────
let curWid = parseInt(localStorage.getItem('curWid') || '1');
if(![1,2,3,4].includes(curWid)) curWid=1;
let done = JSON.parse(localStorage.getItem('done') || '{}');

function save(){
  localStorage.setItem('curWid', curWid);
  localStorage.setItem('done', JSON.stringify(done));
}

function isDone(wid,si,ei){
  return !!(done[wid] && done[wid][si] && done[wid][si][ei]);
}

function toggle(wid,si,ei){
  if(!done[wid]) done[wid]={};
  if(!done[wid][si]) done[wid][si]={};
  done[wid][si][ei] = !done[wid][si][ei];
  save();
  renderContent();
}

function resetDay(){
  if(done[curWid]){ delete done[curWid]; save(); renderContent(); }
}

function setDay(wid){
  curWid=wid; save();
  renderTabs(); renderContent();
  window.scrollTo({top:0,behavior:'smooth'});
}

function getProgress(wid){
  const w=W[wid]; let total=0,doneCount=0;
  w.sections.forEach((s,si)=>s.ex.forEach((_,ei)=>{ total++; if(isDone(wid,si,ei)) doneCount++; }));
  return {total,done:doneCount,pct:total>0?Math.round(doneCount/total*100):0};
}

// ── Render ─────────────────────────────────────────────
function renderTabs(){
  document.getElementById('dayTabs').innerHTML = SCHEDULE.map(d=>{
    const isActive=d.wid===curWid, isRest=!d.wid;
    const cls=isActive?'day-tab active':isRest?'day-tab rest-day':'day-tab inactive';
    const click=isRest?'':` onclick="setDay(${d.wid})"`;
    return `<button class="${cls}"${click} aria-label="${d.label}">
      <span class="tab-lbl">${d.label}</span>
      <span class="tab-sub">${d.short}</span>
    </button>`;
  }).join('');
}

function renderContent(){
  const w=W[curWid];
  const prog=getProgress(curWid);

  const focusPills=w.focus.map(f=>`<span class="focus-pill">${f}</span>`).join('');
  const dayNote=w.dayNote?`<div class="day-note">⚠ ${w.dayNote}</div>`:'';

  function getRestTime(ex,secName){
    if(secName==="Stretching") return null;
    if(secName==="Activation") return "30s";
    if(secName==="Rotator cuff") return "45s";
    if(ex.note&&ex.note.includes("main compound")) return "2–3 min";
    const r=ex.reps.toString();
    if(r.includes("s")) return "60s";
    if(r.includes("each")) return "2 min";
    const n=parseInt(r);
    if(n<=8) return "2–3 min";
    if(n<=10) return "2 min";
    if(n<=12) return "90s";
    return "60s";
  }

  function getLoadLabel(ex,secName){
    if(secName==="Stretching") return null;
    const r=ex.reps.toString();
    if(r.includes("s")) return null;
    if(secName==="Activation"||secName==="Rotator cuff") return {text:"Activation",c:"#6B9E8A"};
    const n=parseInt(r);
    if(n<=8)  return {text:"Heavy",    c:"#C94040"};
    if(n<=12) return {text:"Moderate", c:"#C07030"};
    if(n<=16) return {text:"Light-mod",c:"#9A7A10"};
    if(n<=20) return {text:"Light",    c:"#3B8A5A"};
    return           {text:"Pump",     c:"#5A7BA5"};
  }

  function buildSec(sec,si){
    const rows=sec.ex.map((ex,ei)=>{
      const d=isDone(curWid,si,ei);
      const rt=getRestTime(ex,sec.name);
      const ll=getLoadLabel(ex,sec.name);
      return `<div class="ex-row${d?' done':''}" onclick="toggle(${curWid},${si},${ei})" role="checkbox" aria-checked="${d}">
        <div class="ex-check"><div class="checkmark"></div></div>
        <div class="ex-info">
          <div class="ex-name">${ex.name}</div>
          ${ex.note?`<div class="ex-note">${ex.note}</div>`:''}
          ${rt?`<div class="ex-rest">⏱ ${rt} rest</div>`:''}
        </div>
        <div style="display:flex;flex-direction:column;align-items:center;flex-shrink:0">
          <div class="ex-badge">${ex.sets}×${ex.reps}</div>
          ${ll?`<div class="load-lbl" style="color:${ll.c}">${ll.text}</div>`:''}
        </div>
      </div>`;
    }).join('');
    return `<div class="section-card">
      <div class="sec-head">
        <span class="sec-dot" style="background:${sec.color}"></span>
        <span class="sec-name" style="color:${sec.color}">${sec.name}</span>
      </div>
      ${rows}
    </div>`;
  }

  const mainSections=w.sections.map((sec,si)=>sec.name!=="Stretching"?buildSec(sec,si):'').join('');
  const stretchSections=w.sections.map((sec,si)=>sec.name==="Stretching"?buildSec(sec,si):'').join('');

  const mgHeader = DAY_TYPES.map((t,i)=>{
    const isW = t!=='Rest';
    return `<th class="${isW?'wk':''}" title="${t}">D${i+1}<br><span style="font-weight:400;font-size:8px">${t}</span></th>`;
  }).join('');

  const mgRows = MUSCLES.map(m=>{
    const total = m.days.filter(d=>d>0).length;
    const cells = m.days.map(d=>{
      if(d===0) return `<td><span class="mg-dot mg-none"></span></td>`;
      if(d===1) return `<td><span class="mg-dot" style="background:transparent;border:2.5px solid ${m.color};box-sizing:border-box"></span></td>`;
      return `<td><span class="mg-dot" style="background:${m.color}"></span></td>`;
    }).join('');
    return `<tr><td class="mg-name" style="color:${m.color}">${m.name}</td>${cells}<td class="mg-total" style="color:${m.color}">${total}×</td></tr>`;
  }).join('');

  const muscleGrid=`
    <div class="mg-card">
      <div class="mg-title">Muscle hit map</div>
      <table class="mg-table">
        <thead><tr>
          <th style="text-align:left">Muscle</th>
          ${mgHeader}
          <th style="text-align:right">#</th>
        </tr></thead>
        <tbody>${mgRows}</tbody>
      </table>
      <div class="mg-legend">
        <div class="mg-legend-item">
          <span class="mg-dot" style="background:#888;width:12px;height:12px"></span>Heavy / direct
        </div>
        <div class="mg-legend-item">
          <span class="mg-dot" style="border:2.5px solid #888;background:transparent;box-sizing:border-box;width:12px;height:12px"></span>Secondary / light
        </div>
        <div class="mg-legend-item">
          <span class="mg-dot mg-none" style="width:12px;height:12px"></span>Not trained
        </div>
      </div>
    </div>`;

  document.getElementById('content').innerHTML=`
    <div class="day-header">
      <div class="day-header-top">
        <div>
          <div class="day-title">${w.title}</div>
          <div class="day-dur">${w.duration}</div>
        </div>
        <div class="focus-pills">${focusPills}</div>
      </div>
      ${dayNote}
      <div class="prog-bar-wrap"><div class="prog-bar-fill" style="width:${prog.pct}%"></div></div>
      <div class="prog-text">${prog.done} of ${prog.total} exercises done · ${prog.pct}%</div>
    </div>

    <div class="info-row">
      <span class="row-icon">🏃</span>
      <span class="row-label" style="color:var(--accent-dim-text)">Warm-up</span>
      <span class="row-val">${w.warmup}</span>
    </div>

    ${mainSections}

    <div class="cardio-row">
      <span class="row-icon">❤️</span>
      <span class="row-label" style="color:var(--text2)">Cardio</span>
      <span class="row-val">${w.cardio}</span>
    </div>

    ${stretchSections}

    <button class="reset-btn" onclick="resetDay()">↺ Reset workout progress</button>

    ${muscleGrid}

    <div class="wiki-card">
      <div class="wiki-hd" onclick="toggleWiki()">
        <span>📖 Training guide</span>
        <span class="wiki-arrow" id="wikiArrow">▼</span>
      </div>
      <div class="wiki-body" id="wikiBody">
        <p style="font-size:12px;color:var(--text2);margin-bottom:12px;line-height:1.5">Each exercise has a load label based on its rep range. Here's what each means and how to pick your weight.</p>
        <table class="wiki-table">
          <thead><tr>
            <th>Label</th><th>Reps</th><th>Weight feel</th><th>How many reps left in tank</th><th>Purpose</th>
          </tr></thead>
          <tbody>
            <tr>
              <td><span class="wiki-dot" style="background:#C94040"></span><strong style="color:#C94040">Heavy</strong></td>
              <td>≤8</td>
              <td>~80–90% of your max</td>
              <td>1–2 reps left — near failure</td>
              <td>Strength + maximum muscle tension</td>
            </tr>
            <tr>
              <td><span class="wiki-dot" style="background:#C07030"></span><strong style="color:#C07030">Moderate</strong></td>
              <td>9–12</td>
              <td>~65–80% of your max</td>
              <td>2–3 reps left — challenging</td>
              <td>Primary hypertrophy zone — most growth here</td>
            </tr>
            <tr>
              <td><span class="wiki-dot" style="background:#9A7A10"></span><strong style="color:#9A7A10">Light-mod</strong></td>
              <td>13–16</td>
              <td>~55–65% of your max</td>
              <td>3–4 reps left — controlled</td>
              <td>Hypertrophy + isolation work</td>
            </tr>
            <tr>
              <td><span class="wiki-dot" style="background:#3B8A5A"></span><strong style="color:#3B8A5A">Light</strong></td>
              <td>17–20</td>
              <td>~45–55% of your max</td>
              <td>5+ reps left — never near failure</td>
              <td>Maintenance stimulus on non-Arms days</td>
            </tr>
            <tr>
              <td><span class="wiki-dot" style="background:#5A7BA5"></span><strong style="color:#5A7BA5">Pump</strong></td>
              <td>20+</td>
              <td>~35–45% of your max</td>
              <td>Comfortable throughout</td>
              <td>Blood flow only — protects D7 recovery</td>
            </tr>
            <tr>
              <td><span class="wiki-dot" style="background:#6B9E8A"></span><strong style="color:#6B9E8A">Activation</strong></td>
              <td>—</td>
              <td>Very light</td>
              <td>Easy — not a working set</td>
              <td>Rotator cuff warm-up before pressing</td>
            </tr>
          </tbody>
        </table>
        <div style="margin-top:12px;padding:10px 12px;background:var(--surface2);border-radius:var(--radius-sm)">
          <div style="font-size:11px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:.05em;margin-bottom:6px">Key rule — Arms day (D7)</div>
          <p style="font-size:12px;color:var(--text2);line-height:1.5">D7 is your only true growth session. D1, D3 and D5 arm work is pump/maintenance only. If the light sessions start feeling hard, the weight is too high — drop it immediately.</p>
        </div>
        <div style="margin-top:8px;padding:10px 12px;background:var(--surface2);border-radius:var(--radius-sm)">
          <div style="font-size:11px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:.05em;margin-bottom:6px">Progressive overload</div>
          <p style="font-size:12px;color:var(--text2);line-height:1.5">When you can complete all sets 2 reps above the target (e.g. 10 reps on a ×8 exercise), add 1–2.5kg next session. Track your weights every D7 Arms session.</p>
        </div>
      </div>
    </div>`;
}

function toggleWiki(){
  const b=document.getElementById('wikiBody');
  const a=document.getElementById('wikiArrow');
  if(b&&a){b.classList.toggle('open');a.style.transform=b.classList.contains('open')?'rotate(180deg)':'';}
}
window.toggleWiki=toggleWiki;

renderTabs();
renderContent();
</script>
</body>
</html>
